<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極版：時空財富模擬器</title>
    <style>
        :root { 
            --bg-deep: #050505; --bg-panel: #111; --bg-row: #1a1a1a;
            --accent-blue: #00f2fe; --accent-gold: #ffcc00;
            --up: #ff3b30; --down: #4cd964;
        }
        * { box-sizing: border-box; }
        body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; background: var(--bg-deep); color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 視圖控制：只顯示帶有 active 的 view */
        .view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10; }
        .view.active { display: flex; }
        
        /* ==========================================
           1. 極致浮誇霓虹設定畫面 (Setup View)
           ========================================== */
        #view-setup { background: radial-gradient(circle at center, #110022 0%, #020202 100%); flex-direction: column; align-items: center; justify-content: center; z-index: 600; }
        .setup-box { background: rgba(10, 5, 20, 0.85); padding: 40px; border-radius: 20px; border: 2px solid var(--accent-blue); width: 100%; max-width: 650px; box-shadow: 0 0 20px var(--accent-blue), inset 0 0 20px var(--accent-blue); animation: neonBoxPulse 4s infinite alternate; backdrop-filter: blur(5px); }
        @keyframes neonBoxPulse { 0% { box-shadow: 0 0 20px var(--accent-blue), inset 0 0 20px var(--accent-blue); border-color: var(--accent-blue); } 50% { box-shadow: 0 0 40px #ff2a85, inset 0 0 30px #ff2a85; border-color: #ff2a85; } 100% { box-shadow: 0 0 20px var(--accent-gold), inset 0 0 20px var(--accent-gold); border-color: var(--accent-gold); } }
        .setup-title { color: #fff; text-align: center; margin-top:0; font-size: 2.5em; letter-spacing: 2px; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--accent-gold), 0 0 40px var(--accent-gold), 0 0 80px var(--accent-gold); animation: textFlicker 2.5s infinite alternate; }
        @keyframes textFlicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--accent-gold), 0 0 40px var(--accent-gold); opacity: 1; } 20%, 24%, 55% { text-shadow: none; opacity: 0.7; } }
        .setup-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.2em; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 15px; text-shadow: 0 0 5px #aaa; }
        .opt-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
        .opt-btn { padding: 8px 15px; background: rgba(0,0,0,0.5); border: 1px solid #444; color: #aaa; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.3s; line-height: 1.3; }
        .opt-btn:hover { background: #222; border-color: #fff; color: #fff; box-shadow: 0 0 10px #fff; }
        .opt-btn.active-round { background: rgba(0, 242, 254, 0.2); color: #fff; border: 2px solid var(--accent-blue); box-shadow: 0 0 15px var(--accent-blue), 0 0 30px var(--accent-blue), inset 0 0 10px var(--accent-blue); text-shadow: 0 0 8px #fff, 0 0 15px var(--accent-blue); transform: scale(1.05); }
        .opt-btn.active-group { background: rgba(76, 217, 100, 0.2); color: #fff; border: 2px solid var(--down); box-shadow: 0 0 15px var(--down), 0 0 30px var(--down), inset 0 0 10px var(--down); text-shadow: 0 0 8px #fff, 0 0 15px var(--down); transform: scale(1.05); }
        .opt-btn.active-money { background: rgba(255, 204, 0, 0.2); color: #fff; border: 2px solid var(--accent-gold); box-shadow: 0 0 15px var(--accent-gold), 0 0 30px var(--accent-gold), inset 0 0 10px var(--accent-gold); text-shadow: 0 0 8px #fff, 0 0 15px var(--accent-gold); transform: scale(1.05); }
        .btn-enter-market { width: 100%; padding: 18px; margin-top: 25px; background: transparent; color: #fff; font-weight: bold; font-size: 1.4em; letter-spacing: 2px; border-radius: 10px; cursor: pointer; border: 2px solid #ff3b30; box-shadow: 0 0 15px #ff3b30, 0 0 30px #ff3b30, inset 0 0 15px #ff3b30; text-shadow: 0 0 10px #fff, 0 0 20px #ff3b30; animation: alertPulse 1s infinite alternate; }
        @keyframes alertPulse { 0% { box-shadow: 0 0 15px #ff3b30, inset 0 0 15px #ff3b30; transform: scale(1); } 100% { box-shadow: 0 0 30px #ff3b30, 0 0 50px #ff3b30, inset 0 0 30px #ff3b30; transform: scale(1.03); border-color: #fff; text-shadow: 0 0 15px #fff, 0 0 30px #ff3b30; } }

        /* ==========================================
           2. 時代頭條 (News View)
           ========================================== */
        #view-news { background-color: #020202; position: absolute; width: 100%; height: 100%; flex-direction: column; }
        #newsCanvas { display: block; width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #titleOverlay { position: absolute; top: 20px; width: 100%; text-align: center; color: #00f2fe; font-size: 2rem; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 15px rgba(0, 242, 254, 0.6); pointer-events: none; z-index: 20; }
        .nav-to-exchange { position: absolute; bottom: 40px; right: 40px; background: rgba(0, 0, 0, 0.6); border: 2px solid #00f2fe; color: #00f2fe; font-size: 2rem; padding: 15px 30px; cursor: pointer; border-radius: 15px; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); z-index: 20; font-weight: bold; }
        .nav-to-exchange:hover { background: rgba(0, 242, 254, 0.2); box-shadow: 0 0 30px rgba(0, 242, 254, 0.8); text-shadow: 0 0 10px #fff; transform: scale(1.05); }

        /* ==========================================
           3. 霓虹交易所 (Exchange View)
           ========================================== */
        #adminPanel { width: 360px; background: var(--bg-panel); border-right: 2px solid #333; display: flex; flex-direction: column; padding: 10px; z-index: 100; flex-shrink: 0; }
        #gBtns { flex: 1; overflow-y: auto; margin-bottom: 10px; border-bottom: 1px solid #222; display: grid; grid-template-columns: 1fr; gap: 8px; padding-bottom: 10px; align-content: start; padding-right: 4px;}
        .g-btn { width: 100%; padding: 12px; background: #222; border: 1px solid #333; cursor: pointer; border-radius: 8px; transition: 0.2s; display: flex; flex-direction: column; position: relative; }
        .g-btn.active { background: #2a2a2a; border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        .g-btn-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .g-btn-bottom { display: flex; justify-content: space-between; align-items: center; }
        .g-title { font-weight: bold; color: #fff; font-size: 1.2em; display: flex; align-items: center; gap: 5px; }
        .edit-icon { font-size: 0.8em; opacity: 0.5; transition: 0.2s; }
        .edit-icon:hover { opacity: 1; color: var(--accent-gold); transform: scale(1.2); }
        .g-total { font-size: 0.85em; color: #aaa; }
        .g-cash { font-size: 0.95em; color: var(--accent-gold); font-weight: bold; }
        .portfolio-btn { background: #444; border: 1px solid #666; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 0.85em; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .portfolio-btn:hover { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }

        #boardView { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 25px; background: #000; height: 70px; border-bottom: 2px solid #333; }
        #yearLabel { color: var(--accent-gold); font-size: 2.2vw; font-weight: bold; }
        #stockList { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(8, 1fr); gap: 8px; padding: 10px; }
        .stock-row { display: flex; align-items: center; background: var(--bg-row); padding: 0 15px; border-radius: 10px; border-left: 8px solid #222; cursor: pointer; height: 100%; transition: 0.2s; }
        .stock-row.selected { border: 2px solid white; box-shadow: inset 0 0 15px rgba(255,255,255,0.1); }
        .s-id { font-size: 2vw; font-weight: bold; width: 45px; color: var(--accent-blue); }
        .s-info { flex: 1; min-width: 0; padding: 0 15px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        
        .s-tag { align-self: flex-start; padding: 2px 8px; border-radius: 4px; font-size: 0.8vw; font-weight: bold; white-space: nowrap; }
        .tag-tech { background: rgba(0, 242, 254, 0.15); color: #00f2fe; border: 1px solid #00f2fe; }
        .tag-energy { background: rgba(255, 102, 0, 0.15); color: #ff6600; border: 1px solid #ff6600; }
        .tag-ship { background: rgba(0, 102, 255, 0.15); color: #4da6ff; border: 1px solid #4da6ff; }
        .tag-ev { background: rgba(76, 217, 100, 0.15); color: #4cd964; border: 1px solid #4cd964; }
        .tag-crypto { background: rgba(153, 51, 255, 0.15); color: #c266ff; border: 1px solid #c266ff; }
        .tag-retail { background: rgba(255, 42, 133, 0.15); color: #ff2a85; border: 1px solid #ff2a85; }

        .s-desc { font-size: 0.95vw; color: #ddd; font-weight: bold; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .s-price { font-size: 2.2vw; width: 140px; text-align: right; font-family: monospace; }
        .s-percent { font-size: 2.5vw; width: 140px; text-align: right; font-weight: bold; }
        .red { color: var(--up) !important; } .green { color: var(--down) !important; }

        /* 浮動交易面板 */
        #floatingTradePanel { position: absolute; bottom: 20px; width: 420px; background: rgba(10, 10, 10, 0.95); border: 2px solid var(--accent-gold); border-radius: 12px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; backdrop-filter: blur(10px); transition: left 0.3s, right 0.3s; }
        .t-head { display: flex; justify-content: space-between; align-items: center; font-size: 1.6em; font-weight: bold; margin-bottom: 8px; }
        .t-head .sid-span { color: var(--accent-blue); font-size: 1.2em; margin-left: 5px; }
        .t-close { cursor: pointer; color: #888; font-size: 1.3em; transition: 0.2s; }
        .t-close:hover { color: #fff; }
        .t-desc { font-size: 1.1em; color: #aaa; margin-bottom: 18px; border-bottom: 1px dashed #333; padding-bottom: 12px; line-height: 1.4; display: flex; flex-direction: column; gap: 8px; }
        .t-cash { color: var(--accent-gold); font-size: 2.2em; font-weight: bold; text-align: center; margin-bottom: 18px; }
        #calcInfo { font-size: 1.1em; color: #888; text-align: center; height: 1.2em; font-weight: bold; margin-bottom: 12px; }
        #calcInfo.over { color: var(--up); animation: blink 0.5s infinite; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .q-btn { padding: 12px 0; font-size: 1.1em; background: #222; border: 1px solid #444; color: #eee; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.1s; }
        .q-btn:hover { background: #333; }
        #tradeQty { width: 100%; font-size: 2em; padding: 10px; margin-bottom: 12px; text-align: center; background: #000; color: #fff; border: 1px solid #444; border-radius: 6px; }

        /* 資金調整浮動視窗 */
        .adj-btn-opt { padding: 10px; font-size: 1.1em; background: #222; color: #fff; border: 1px solid #555; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .adj-btn-opt:hover { background: var(--accent-gold); color: #000; border-color: var(--accent-gold); box-shadow: 0 0 15px rgba(255,204,0,0.5); }
        
        /* 持股報表 */
        #portfolioView { position: absolute; top: 70px; left: 0; width: 100%; height: calc(100% - 70px); background: var(--bg-deep); z-index: 50; display: none; flex-direction: column; padding: 30px; }
        .asset-table { width: 100%; border-collapse: collapse; font-size: 1.5em; }
        .asset-table th { text-align: left; color: var(--accent-blue); border-bottom: 2px solid #333; padding: 10px; }
        .asset-table td { padding: 12px 10px; border-bottom: 1px solid #222; }
        .s-q-btn { background: #331111; color: var(--up); border: 1px solid var(--up); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7em; font-weight: bold; margin-right: 5px; }
        .s-q-btn.all { background: var(--up); color: white; }
        .adj-btn { background: #444; border: 1px solid #666; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.4em; vertical-align: middle; margin-left: 15px; }
        .adj-btn:hover { background: var(--accent-gold); color: black; }

        /* 揭曉面板 */
        #finalRankModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .reveal-box { width: 90%; max-width: 800px; background: #111; border: 2px solid var(--accent-blue); border-radius: 15px; padding: 40px; box-shadow: 0 0 40px rgba(0,242,254,0.3); text-align: center; position: relative; }
        .rank-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; margin-bottom: 10px; background: #222; border-radius: 8px; font-size: 1.5em; font-weight: bold; color: #555; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #333; height: 70px; }
        .rank-row.revealed { color: #fff; background: #1a1a1a; border-color: var(--accent-blue); box-shadow: inset 0 0 15px rgba(0,242,254,0.2); transform: scale(1.02); }
        .rank-row.first-place.revealed { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(255,204,0,0.1); font-size: 2em; height: 90px; box-shadow: 0 0 30px rgba(255,204,0,0.4), inset 0 0 20px rgba(255,204,0,0.2); animation: firstPlacePulse 1.5s infinite alternate; margin-top: 20px; margin-bottom: 20px; }
        .btn-reveal-next { margin-top: 30px; padding: 18px 40px; font-size: 1.6em; font-weight: bold; letter-spacing: 2px; background: var(--up); color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(255,59,48,0.5); width: 100%; }
        .btn-reveal-next:hover { background: #ff5247; box-shadow: 0 0 30px rgba(255,59,48,0.8); transform: translateY(-2px); }
        .btn-reveal-next.done { background: var(--accent-gold); color: #000; box-shadow: 0 0 20px rgba(255,204,0,0.5); }
        .btn-reveal-next.done:hover { background: #fff; box-shadow: 0 0 30px #fff; }
        .arc-close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5em; color: #888; cursor: pointer; transition: 0.2s; background: none; border: none; outline: none; }
        .arc-close-btn:hover { color: #fff; transform: scale(1.2); }

        /* ==========================================
           4. 檔案庫 (Archive View)
           ========================================== */
        #view-archive { background: var(--bg-deep); width: 100%; height: 100%; overflow-y: auto; padding: 30px; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; padding-bottom: 50px; }
        .card-container { perspective: 1000px; height: 180px; cursor: pointer; }
        .card { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; position: relative; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; padding: 20px; border: 2px solid #333; background: var(--bg-panel); }
        .card-front { z-index: 2; }
        .card-front:hover { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        .card-back { transform: rotateY(180deg); border-color: var(--accent-gold); background: #1a1a1a; align-items: center; }
        .c-id { font-size: 2.5em; font-weight: bold; color: var(--accent-blue); margin-bottom: 10px; }
        .c-hint { font-size: 1.1em; color: #ccc; line-height: 1.4; }
        .c-real-name { font-size: 2.2em; font-weight: bold; color: var(--accent-gold); margin-bottom: 15px; text-align: center; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .btn-chart { background: var(--accent-blue); color: #000; border: none; padding: 10px 20px; font-size: 1.1em; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-chart:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        /* 檔案庫圖表彈出視窗 */
        #archiveChartModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .arc-modal-content { background: #111; border: 2px solid var(--accent-blue); border-radius: 15px; width: 90%; max-width: 1000px; padding: 30px; position: relative; box-shadow: 0 0 30px rgba(0,242,254,0.3); }
        .arc-modal-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .arc-modal-title { font-size: 2.5em; color: var(--accent-gold); font-weight: bold; margin: 0; }
        .arc-modal-stats { font-size: 1.2em; color: #ccc; }
        .stat-up { color: var(--up); font-weight: bold; }
        .stat-down { color: var(--down); font-weight: bold; }
        .btn-play { background: var(--up); color: white; border: none; padding: 10px 25px; font-size: 1.2em; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 15px rgba(255, 59, 48, 0.4); }
        .btn-play:hover { background: #ff5247; transform: scale(1.05); }
        .btn-info { background: #222; color: #ccc; border: 1px solid #555; padding: 5px 12px; font-size: 1rem; border-radius: 6px; cursor: pointer; transition: 0.2s; white-space: nowrap; font-weight: bold; }
        .btn-info:hover { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); }
        #arcModalBody { position: relative; min-height: 450px; }
        #infoBox { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 17, 17, 0.98); z-index: 10; padding: 30px; border-radius: 8px; border: 2px solid var(--accent-blue); flex-direction: column; overflow-y: auto; }
        .info-content { font-size: 1.4em; line-height: 1.8; color: #eee; text-align: left; }
        .info-image { text-align: center; margin-top: 25px; padding: 20px; background: #000; border-radius: 12px; border: 1px dashed var(--accent-gold); font-size: 4rem; letter-spacing: 25px; text-shadow: 0 0 20px rgba(0,242,254,0.4); box-shadow: inset 0 0 20px rgba(255,204,0,0.15); }
        #archiveChartCanvas { background: #0a0a0a; border-radius: 8px; width: 100%; height: 450px; cursor: crosshair; }
        #eventBox { margin-top: 20px; padding: 20px; background: rgba(0, 0, 0, 0.6); border: 1px solid #333; border-left: 5px solid var(--accent-gold); border-radius: 8px; font-size: 1.2em; line-height: 1.5; min-height: 100px; color: #ddd; transition: 0.3s; }

        /* 存檔與音樂按鈕特效 */
        .save-load-box { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .sl-btn { padding: 8px 2px; background: #1a1a1a; color: #ddd; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9em; text-align: center; transition: 0.2s; }
        .sl-btn:hover { background: #333; color: var(--accent-gold); border-color: #666; }
        #btnMusic { background: none; border: none; color: #00f2fe; cursor: pointer; font-size: 1.5em; transition: 0.2s; outline: none; padding: 5px; text-shadow: 0 0 10px #00f2fe; }
        #btnMusic.muted { color: #555; text-shadow: none; }
        #btnMusic:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<!-- ⚙️ 視圖 1：設定畫面 -->
<div id="view-setup" class="view active">
    <div class="setup-box">
        <h2 class="setup-title">🚀 終極版：時空財富模擬器</h2>
        
        <div class="setup-row" style="flex-direction: column; align-items: stretch;">
            <div style="text-align: center;">遊戲回合數</div>
            <div class="opt-row" id="roundCountOpts">
                <button class="opt-btn active-round" onclick="setRoundCount(this, 10)">10 回合<br><span style="font-size:0.7em; font-weight:normal; opacity:0.8;">(2016起)</span></button>
                <button class="opt-btn" onclick="setRoundCount(this, 8)">8 回合<br><span style="font-size:0.7em; font-weight:normal; opacity:0.8;">(2018起)</span></button>
                <button class="opt-btn" onclick="setRoundCount(this, 6)">6 回合<br><span style="font-size:0.7em; font-weight:normal; opacity:0.8;">(2020起)</span></button>
                <button class="opt-btn" onclick="setRoundCount(this, 4)">4 回合<br><span style="font-size:0.7em; font-weight:normal; opacity:0.8;">(2022起)</span></button>
                <button class="opt-btn" onclick="setRoundCount(this, 2)">2 回合<br><span style="font-size:0.7em; font-weight:normal; opacity:0.8;">(2024起)</span></button>
            </div>
        </div>
        
        <div class="setup-row" style="flex-direction: column; align-items: stretch;">
            <div style="text-align: center;">參賽組數</div>
            <div class="opt-row" id="groupCountOpts">
                <button class="opt-btn" onclick="setGroupCount(this, 1)">1 組</button>
                <button class="opt-btn" onclick="setGroupCount(this, 2)">2 組</button>
                <button class="opt-btn" onclick="setGroupCount(this, 3)">3 組</button>
                <button class="opt-btn" onclick="setGroupCount(this, 4)">4 組</button>
                <button class="opt-btn" onclick="setGroupCount(this, 5)">5 組</button>
                <button class="opt-btn active-group" onclick="setGroupCount(this, 6)">6 組</button>
            </div>
        </div>

        <div class="setup-row" style="border-bottom: none; padding-bottom: 0; flex-direction: column; align-items: stretch;">

<script>
// ==========================================
// 0. 音效與音樂系統 (安全封裝版)
// ==========================================
let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    return audioCtx;
}

const SoundFX = {
    play: function(freq, type, time, vol) {
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            gain.gain.setValueAtTime(vol, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + time);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + time);
        } catch(e) {}
    },
    open: function() { setTimeout(() => this.play(523.25, 'sine', 0.3, 0.2), 0); setTimeout(() => this.play(659.25, 'sine', 0.3, 0.2), 100); setTimeout(() => this.play(783.99, 'sine', 0.5, 0.2), 200); },
    buy: function() { setTimeout(() => this.play(1046.50, 'sine', 0.1, 0.15), 0); setTimeout(() => this.play(1318.51, 'sine', 0.2, 0.15), 50); },
    sell: function() { setTimeout(() => this.play(880, 'square', 0.1, 0.05), 0); setTimeout(() => this.play(783.99, 'square', 0.2, 0.05), 50); },
    error: function() { this.play(150, 'sawtooth', 0.3, 0.1); },
    tick: function() { this.play(1200, 'triangle', 0.05, 0.01); },
    reveal: function() {
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        } catch(e) {}
    },
    champion: function() { [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((f, i) => { setTimeout(() => this.play(f, 'sine', 0.6, 0.2), i * 150); }); }
};

const MusicSystem = {
    isPlaying: false, isMuted: false, currentMode: 'idle', step: 0, nextNoteTime: 0, timerID: null,
    m2f: function(m) { return Math.pow(2, (m - 69) / 12) * 440; },
    playNote: function(freq, type, duration, vol, time) {
        if(this.isMuted || !freq) return;
        try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator(); const gain = ctx.createGain(); const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(this.currentMode === 'idle' ? 800 : (this.currentMode === 'news' ? 400 : 2500), time); filter.frequency.exponentialRampToValueAtTime(100, time + duration);
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, time); gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
            osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
            osc.start(time); osc.stop(time + duration);
        } catch(e) {}
    },
    schedule: function() {
        if(!this.isPlaying) return;
        try {
            const ctx = getAudioCtx();
            while (this.nextNoteTime < ctx.currentTime + 0.1) {
                this.playStep(this.step, this.nextNoteTime);
                this.step = (this.step + 1) % 16;
                const beatLen = this.currentMode === 'idle' ? 0.3 : (this.currentMode === 'news' ? 0.4 : 0.15);
                this.nextNoteTime += beatLen;
            }
            this.timerID = requestAnimationFrame(this.schedule.bind(this));
        } catch(e) {}
    },
    playStep: function(step, time) {
        if(this.currentMode === 'idle') {
            const bass = [45, 0, 45, 0, 48, 0, 48, 0, 41, 0, 41, 0, 43, 0, 43, 0];
            const arp = [57, 60, 64, 60, 60, 64, 67, 64, 53, 57, 60, 57, 55, 59, 62, 59];
            if(bass[step]) this.playNote(this.m2f(bass[step]), 'sawtooth', 0.4, 0.05, time);
            this.playNote(this.m2f(arp[step]), 'square', 0.15, 0.02, time);
        } else if (this.currentMode === 'running') {
            const bass = [40, 40, 41, 41, 43, 43, 44, 44, 40, 40, 41, 41, 45, 45, 47, 47];
            const arp = 60 + step;
            if(step % 2 === 0) this.playNote(this.m2f(bass[step]), 'sawtooth', 0.1, 0.06, time);
            this.playNote(this.m2f(arp), 'square', 0.1, 0.03, time);
        } else if (this.currentMode === 'news') {
            const bass = [33, 0, 0, 0, 33, 0, 0, 0, 31, 0, 0, 0, 38, 0, 0, 0];
            if(bass[step]) this.playNote(this.m2f(bass[step]), 'sawtooth', 0.8, 0.08, time);
        }
    },
    start: function(mode) {
        try {
            const ctx = getAudioCtx();
            this.currentMode = mode;
            if (!this.isPlaying) { this.isPlaying = true; this.step = 0; this.nextNoteTime = ctx.currentTime + 0.05; this.schedule(); }
        } catch(e) {}
    },
    stop: function() { this.isPlaying = false; cancelAnimationFrame(this.timerID); },
    switchMode: function(mode) { this.currentMode = mode; },
    toggleMute: function() { this.isMuted = !this.isMuted; return this.isMuted; }
};

function toggleMusic() {
    const isMuted = MusicSystem.toggleMute();
    const btn = document.getElementById('btnMusic');
    if (isMuted) { btn.innerText = '🔇'; btn.className = 'muted'; } 
    else { btn.innerText = '🔊'; btn.className = ''; }
}

function resumeMusicOnInteract() {
    if (!MusicSystem.isPlaying && !MusicSystem.isMuted && !maskRankings) {
        MusicSystem.start('idle');
    }
}

let stockData = [];
stockLoreData.forEach((lore, index) => {
    let prices = [];
    let currentP = lore.price;
    let yearlyEndPrices = [lore.price];
    for (let y = 0; y < 10; y++) {
        let targetP = currentP * (1 + lore.yearly[y] / 100);
        let diff = targetP - currentP;
        for (let m = 1; m <= 12; m++) {
            let stepP = currentP + (diff * (m / 12));
            if (m < 12) stepP += Math.sin((y * 12 + m) * 0.5 + index) * (currentP * 0.03); 
            prices.push(Math.max(1, Math.round(stepP)));
        }
        currentP = targetP;
        yearlyEndPrices.push(Math.max(1, Math.round(currentP)));
    }
    stockData.push({ 
        id: lore.id, category: lore.category, tagClass: lore.tagClass, 
        hint: lore.hint, background: lore.background, realName: lore.realName,
        history: prices, yearlyPrices: yearlyEndPrices, 
        basePrice: lore.price, currentPrice: lore.price 
    });
});

function saveGame() {

    localStorage.setItem('neon_save', JSON.stringify(saveData));
    alert("✅ 存檔成功！");
}

function loadGame() {
    let saveStr = localStorage.getItem('neon_save');
    if(!saveStr) return alert("❌ 找不到存檔紀錄！");
    let saveData = JSON.parse(saveStr);
    let pwd = prompt("請輸入您的「讀檔密碼」：");
    if(pwd !== saveData.password) return alert("❌ 密碼錯誤，讀檔失敗！");
    applySaveData(saveData);
}

function exportGame() {
    if(groups.length === 0) return alert("遊戲還沒開始，無法匯出！");
    let pwd = prompt("請設定一組「存檔密碼」：");
    if(pwd === null) return;
    const saveData = { password: pwd, curY: curY, playStartOffset: playStartOffset, groups: groups, stockData: stockData };
    const jsonStr = JSON.stringify(saveData);
    const blob = new Blob([jsonStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const dlAnchor = document.createElement('a');
    dlAnchor.href = url; dlAnchor.download = `neon_exchange_save_${curY >= 10 ? 'final' : (2016+curY)}.json`;
    document.body.appendChild(dlAnchor); dlAnchor.click(); document.body.removeChild(dlAnchor); URL.revokeObjectURL(url);
    alert("✅ 存檔已觸發下載！");
}

function importGame(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const saveData = JSON.parse(e.target.result);
            let pwd = prompt("請輸入此存檔的「讀檔密碼」：");
            if(pwd !== saveData.password) { alert("❌ 密碼錯誤！"); event.target.value = ""; return; }
            applySaveData(saveData);
        } catch (err) { alert("❌ 讀檔失敗：檔案損壞！"); }
        event.target.value = ""; 
    };
    reader.readAsText(file);
}

function applySaveData(saveData) {
    curY = saveData.curY;
    playStartOffset = saveData.playStartOffset || 0;
    groups = saveData.groups;
    stockData = saveData.stockData;
    groups.forEach(g => { if (!g.name) g.name = `G${g.id}`; if (g.hasTradedThisYear === undefined) g.hasTradedThisYear = false; });
    initUI();
    
    if (curY >= 10) {
        maskRankings = true; updateRank();
        switchView('view-exchange');

        document.getElementById('endGameControls').style.display = 'grid';

        maskRankings = false; updateRank();
        document.getElementById('btnMarket').style.display = 'block';
        document.getElementById('endGameControls').style.display = 'none';
        goToNews();
    }
    alert("✅ 讀檔成功！已恢復進度。");
}

let newsAnimReq;
const newsCanvas = document.getElementById('newsCanvas');
const newsCtx = newsCanvas.getContext('2d');
let nw, nh;
let charIndex = 0;
let isTyping = true;
let scanlineY = 0;
let particles = [];

function resizeNews() {
    nw = window.innerWidth; nh = window.innerHeight;
    newsCanvas.width = nw; newsCanvas.height = nh;
    if(particles.length === 0) {
        particles = Array.from({ length: 100 }).map(() => ({ x: Math.random() * nw, y: Math.random() * nh, speedY: Math.random() * 1 + 0.5, size: Math.random() * 2 + 1, opacity: Math.random() * 0.5 + 0.1 }));
    }
}
window.addEventListener('resize', () => {
    if (document.getElementById('view-news').classList.contains('active')) resizeNews();
});

function wrapText(context, text, x, y, maxWidth, lineHeight) {
    const words = text.split('');
    let line = ''; let currentY = y;
    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n];
        let metrics = context.measureText(testLine);
        if (metrics.width > maxWidth && n > 0) {
            context.fillText(line, x, currentY); line = words[n]; currentY += lineHeight;
        } else { line = testLine; }
    }
    context.fillText(line, x, currentY);
    return currentY + lineHeight;
}

function startNewsView() {
    resizeNews();
    charIndex = 0; isTyping = true;
    if(newsAnimReq) cancelAnimationFrame(newsAnimReq);
    animateNews();
}

function stopNewsAnim() {
    if(newsAnimReq) cancelAnimationFrame(newsAnimReq);
}

function animateNews() {
    newsCtx.fillStyle = 'rgba(5, 5, 5, 0.3)'; newsCtx.fillRect(0, 0, nw, nh);
    newsCtx.strokeStyle = 'rgba(0, 242, 254, 0.05)'; newsCtx.lineWidth = 1;
    for(let x = 0; x < nw; x += 50) { newsCtx.beginPath(); newsCtx.moveTo(x, 0); newsCtx.lineTo(x, nh); newsCtx.stroke(); }
    for(let y = 0; y < nh; y += 50) { newsCtx.beginPath(); newsCtx.moveTo(0, y); newsCtx.lineTo(nw, y); newsCtx.stroke(); }

    newsCtx.fillStyle = '#00f2fe';
    particles.forEach(p => {
        newsCtx.globalAlpha = p.opacity; newsCtx.beginPath(); newsCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); newsCtx.fill();
        p.y -= p.speedY; if (p.y < 0) p.y = nh;
    });
    newsCtx.globalAlpha = 1.0;

    let displayYear = 2016 + curY;
    newsCtx.fillStyle = 'rgba(255, 255, 255, 0.06)'; newsCtx.font = 'bold 35vw monospace'; newsCtx.textAlign = 'center'; newsCtx.textBaseline = 'middle';
    newsCtx.fillText(displayYear, nw / 2, nh / 2 + 50);

    newsCtx.fillStyle = '#ffcc00'; newsCtx.font = 'bold 3.5rem "Noto Sans TC"'; newsCtx.textAlign = 'center'; newsCtx.textBaseline = 'top';
    newsCtx.shadowColor = 'rgba(255, 204, 0, 0.8)'; newsCtx.shadowBlur = 15;
    newsCtx.fillText(`【 ${displayYear} 年 】`, nw / 2, nh * 0.12); newsCtx.shadowBlur = 0;

    newsCtx.textAlign = 'left';
    const items = newsData[displayYear] || ["今年全球平靜無波，市場等待新契機。"];
    const allText = items.join("\n\n");
    
    if (isTyping) { charIndex += 3; if (charIndex >= allText.length) { charIndex = allText.length; isTyping = false; } }

    const blocks = allText.substring(0, Math.floor(charIndex)).split('\n\n');
    let startY = nh * 0.28; const maxW = nw * 0.65; const startX = nw * 0.18;

    newsCtx.font = 'bold 2rem "Noto Sans TC"'; newsCtx.fillStyle = '#ffffff'; newsCtx.shadowColor = '#00f2fe'; newsCtx.shadowBlur = 8;
    blocks.forEach(block => {
        if(block.length > 0) {
            newsCtx.fillStyle = '#ffcc00'; newsCtx.fillText("▶", startX - 40, startY);
            newsCtx.fillStyle = '#ffffff'; startY = wrapText(newsCtx, block, startX, startY, maxW, 45); startY += 25;
        }
    });
    newsCtx.shadowBlur = 0;
    newsCtx.fillStyle = 'rgba(255, 255, 255, 0.03)'; newsCtx.fillRect(0, scanlineY, nw, 10); scanlineY += 5; if (scanlineY > nh) scanlineY = 0;

    newsAnimReq = requestAnimationFrame(animateNews);
}

        list.innerHTML += `
            <div class="stock-row" id="sr-${s.id}" onclick="selectStock(event, '${s.id}')">

function confirmRunMarket() {
    if (isPlaying) return;
    const untradedGroups = groups.filter(g => !g.hasTradedThisYear);
    if (untradedGroups.length > 0) {
        const names = untradedGroups.map(g => g.name).join('、');
        if (!window.confirm(`⚠️ 尚有 ${untradedGroups.length} 組未交易：[ ${names} ]\n確定跳過直接結算嗎？`)) return; 
    }
    runMarket();
}

const delay = ms => new Promise(res => setTimeout(res, ms));

async function runMarket() {
    isPlaying = true;
    hidePortfolio(); closeTradePanel(); selG = null;
    SoundFX.open(); MusicSystem.start('running');
    
    if (curY === 9) { maskRankings = true; updateRank(); }
    
    const btn = document.getElementById('btnMarket');
    const monthTag = document.getElementById('monthTag');
    try {
        btn.disabled = true; btn.innerText = "⏳ 市場跳動中..."; monthTag.style.display = 'inline';
        const baseIdx = curY * 12; const startPrices = {};
        stockData.forEach(s => { startPrices[s.id] = (baseIdx === 0) ? s.basePrice : s.history[baseIdx - 1]; });

        for (let m = 1; m <= 12; m++) {
            monthTag.innerText = `${m} 月`; SoundFX.tick();
            stockData.forEach(s => {
                const newP = s.history[baseIdx + m - 1]; s.currentPrice = newP;
                const elPrice = document.getElementById(`pr-${s.id}`), elPercent = document.getElementById(`pc-${s.id}`), elRow = document.getElementById(`sr-${s.id}`);
                if (elPrice && elPercent && elRow) {
                    elPrice.innerText = "$" + newP.toLocaleString();
                    const ytd = ((newP / startPrices[s.id]) - 1) * 100;
                    elPercent.innerText = (ytd >= 0 ? "+" : "") + Math.round(ytd) + "%";
                    elPercent.className = "s-percent " + (ytd >= 0 ? "red" : "green");
                    elRow.style.borderLeftColor = ytd >= 0 ? "var(--up)" : "var(--down)";
                }
            });
            updateRank(); await delay(200); 
        }

        curY++; monthTag.innerText = "結算完畢";
        groups.forEach(g => g.hasTradedThisYear = false);
        
        if (curY >= 10) {
            // 切換為結算後的控制面板
            document.getElementById('btnMarket').style.display = 'none';
            document.getElementById('endGameControls').style.display = 'grid';
            document.getElementById('yearLabel').innerHTML = "最終結算 (名次保密中)";
        } else {
            btn.innerText = `📰 前往 ${2016 + curY} 年新聞 ❯`; btn.style.background = 'var(--accent-blue)'; btn.style.color = '#000'; btn.style.borderColor = 'var(--accent-blue)';
            btn.onclick = goToNews;
        }
    } catch (error) { console.error("Error:", error); } 
    finally { isPlaying = false; btn.disabled = false; MusicSystem.stop(); }
}

function buyMax() { if(!selS || !selG) return; const g = groups.find(x => x.id === selG); const s = stockData.find(x => x.id === selS); document.getElementById('tradeQty').value = Math.floor(g.money / s.currentPrice); calculateTotal(); }
function doBuy() { const g = groups.find(x => x.id === selG); const shares = parseInt(document.getElementById('tradeQty').value); const s = stockData.find(x => x.id === selS); if (selS && shares * s.currentPrice <= g.money && shares > 0) { SoundFX.buy(); const totalShares = (g.stocks[selS] || 0) + shares; g.costs[selS] = ((g.stocks[selS] || 0) * (g.costs[selS] || 0) + shares * s.currentPrice) / totalShares; g.money -= shares * s.currentPrice; g.stocks[selS] = totalShares; g.hasTradedThisYear = true; updateRank(); clearInput(); if(document.getElementById('portfolioView').style.display === 'flex') showPortfolio(); if (document.getElementById('floatingTradePanel').style.display === 'flex') { document.getElementById('t-cash').innerText = `現金: $${Math.floor(g.money).toLocaleString()}`; } } else if (shares > 0) { SoundFX.error(); alert("餘額不足！"); } }
function quickSell(sid, amount) { const g = groups.find(x => x.id === selG); const s = stockData.find(x => x.id === sid); const actualSell = Math.min(amount, g.stocks[sid]); if (actualSell > 0) SoundFX.sell(); g.money += actualSell * s.currentPrice; g.stocks[sid] -= actualSell; g.hasTradedThisYear = true; updateRank(); showPortfolio(); if (document.getElementById('floatingTradePanel').style.display === 'flex') { document.getElementById('t-cash').innerText = `現金: $${Math.floor(g.money).toLocaleString()}`; calculateTotal(); } }

let pendingAdj = 0;
function adjustMoney() { if(!selG) return; resumeMusicOnInteract(); pendingAdj = 0; updateAdjUI(); document.getElementById('adjustMoneyModal').style.display = 'flex'; }
function stageAdjustment(amount) { if(!selG) return; const g = groups.find(x => x.id === selG); pendingAdj = (g.money + pendingAdj + amount < 0) ? -g.money : pendingAdj + amount; updateAdjUI(); }
function updateAdjUI() { const g = groups.find(x => x.id === selG); document.getElementById('adj-g-name').innerText = g.name; document.getElementById('adj-g-cash').innerText = `原現金: $${Math.floor(g.money).toLocaleString()}`; const diffEl = document.getElementById('adj-g-diff'); diffEl.innerText = pendingAdj === 0 ? `調整: $0` : (pendingAdj > 0 ? `調整: +$${pendingAdj.toLocaleString()}` : `調整: -$${Math.abs(pendingAdj).toLocaleString()}`); diffEl.style.color = pendingAdj === 0 ? '#888' : (pendingAdj > 0 ? 'var(--up)' : 'var(--down)'); document.getElementById('adj-g-final').innerText = `結算後: $${Math.floor(g.money + pendingAdj).toLocaleString()}`; }
function resetAdjustment() { pendingAdj = 0; updateAdjUI(); }
function confirmAdjustment() { if(!selG) return; const g = groups.find(x => x.id === selG); if (pendingAdj !== 0) SoundFX.buy(); g.money += pendingAdj; closeAdjustModal(); showPortfolio(); updateRank(); if (document.getElementById('floatingTradePanel').style.display === 'flex') { document.getElementById('t-cash').innerText = `現金: $${Math.floor(g.money).toLocaleString()}`; calculateTotal(); } }
function closeAdjustModal() { document.getElementById('adjustMoneyModal').style.display = 'none'; }

function openPortfolio(event, id) { event.stopPropagation(); if (maskRankings && curY >= 10) return alert("🔒 最終結算中，為確保公平鎖定持股！"); resumeMusicOnInteract(); selG = id; updateGroupButtons(); showPortfolio(); closeTradePanel(); }
function showPortfolio() { const g = groups.find(x => x.id === selG); if (!g) return; document.getElementById('assetTitle').innerText = `${g.name} 持股明細`; document.getElementById('assetCashDisplay').innerHTML = `現金：$${Math.floor(g.money).toLocaleString()} <button class="adj-btn" onclick="adjustMoney()">💰 資金調整</button>`; let html = ''; for(let sid in g.stocks) { if(g.stocks[sid] > 0) { const s = stockData.find(x => x.id === sid); const diff = Math.round((s.currentPrice - g.costs[sid]) * g.stocks[sid]); html += `<tr><td>${sid}</td><td><span class="s-tag ${s.tagClass}" style="font-size:0.5em; padding:2px 5px; margin-right:8px;">${s.category}</span>${Math.floor(g.stocks[sid]).toLocaleString()}</td><td>$${Math.round(g.costs[sid]).toLocaleString()}</td><td>$${Math.round(s.currentPrice).toLocaleString()}</td><td class="${diff >= 0 ? 'red' : 'green'}">${diff >= 0 ? '賺' : '賠'} $${Math.abs(diff).toLocaleString()}</td><td><button class="s-q-btn" onclick="quickSell('${sid}', 100)">-100</button><button class="s-q-btn" onclick="quickSell('${sid}', 1000)">-1K</button><button class="s-q-btn all" onclick="quickSell('${sid}', 9999999)">清空</button></td></tr>`; } } document.getElementById('assetList').innerHTML = html || '<tr><td colspan="6" style="text-align:center;padding:50px;color:#444;">目前無持股</td></tr>'; document.getElementById('portfolioView').style.display = 'flex'; }
function hidePortfolio() { document.getElementById('portfolioView').style.display = 'none'; }

function renameGroup(event, id) { event.stopPropagation(); if (maskRankings && curY >= 10) return alert("🔒 結算中禁止改名！"); const g = groups.find(x => x.id === id); let newName = prompt(`請輸入新名稱(最多5字)：\n原名：${g.name}`, g.name); if (newName !== null && newName.trim() !== "") { g.name = newName.trim().substring(0, 5); updateGroupButtons(); updateRank(); if (selG === id && document.getElementById('portfolioView').style.display === 'flex') document.getElementById('assetTitle').innerText = `${g.name} 持股明細`; } }
function updateGroupButtons() { const btnBox = document.getElementById('gBtns'); btnBox.innerHTML = ''; let displayGroups = [...groups]; if (maskRankings) displayGroups.sort((a, b) => a.id - b.id); else displayGroups.sort((a, b) => getTotal(b) - getTotal(a)); displayGroups.forEach(g => { const activeClass = (selG === g.id) ? 'active' : ''; const totalText = maskRankings ? '???' : `$${Math.floor(getTotal(g)).toLocaleString()}`; const cashText = maskRankings ? '???' : `$${Math.floor(g.money).toLocaleString()}`; btnBox.innerHTML += `<div class="g-btn ${activeClass}" onclick="toggleGroup(${g.id})"><div class="g-btn-top"><div class="g-title">${g.name} <span class="edit-icon" onclick="renameGroup(event, ${g.id})">✏️</span></div><button class="portfolio-btn" onclick="openPortfolio(event, ${g.id})">💼 持股</button></div><div class="g-btn-bottom"><div class="g-total">總值: <span style="color:${maskRankings?'#ff3b30':''}">${totalText}</span></div><div class="g-cash">現金: <span style="color:${maskRankings?'#ff3b30':''}">${cashText}</span></div></div></div>`; }); }
function updateRank() { if (maskRankings) { document.getElementById('r1').innerHTML = `<span style="color:var(--up); animation: blink 1s infinite;">結算中... 名次保密</span>`; document.getElementById('r2').innerText = `---`; document.getElementById('r3').innerText = `---`; updateGroupButtons(); return; } const sorted = [...groups].sort((a, b) => getTotal(b) - getTotal(a)); document.getElementById('r1').innerText = `${sorted[0].name} ($${Math.floor(getTotal(sorted[0])).toLocaleString()})`; if (sorted[1]) document.getElementById('r2').innerText = `${sorted[1].name}`; if (sorted[2]) document.getElementById('r3').innerText = `${sorted[2].name}`; updateGroupButtons(); }
function getTotal(g) { let v = g.money; for(let sid in g.stocks) v += g.stocks[sid] * stockData.find(x => x.id == sid).currentPrice; return v; }

function openFinalReveal() { 
    MusicSystem.stop(); 
    document.getElementById('finalRankModal').style.display = 'flex'; 
    finalSortedGroups = [...groups].sort((a, b) => getTotal(b) - getTotal(a)); 
    currentRevealRank = finalSortedGroups.length; 
    renderRevealList(); 
}
function renderRevealList() { 
    const container = document.getElementById('revealList'); 
    container.innerHTML = ''; 
    finalSortedGroups.forEach((g, index) => { 
        const rank = index + 1; const isRevealed = rank > currentRevealRank; 
        const rankName = isRevealed ? g.name : "???"; 
        const rankTotal = isRevealed ? `$${Math.floor(getTotal(g)).toLocaleString()}` : "???"; 
        const isFirst = (isRevealed && rank === 1); 
        container.innerHTML += `<div class="rank-row ${isRevealed ? 'revealed' : ''} ${isFirst ? 'first-place' : ''}"><div style="width: 150px; text-align: left;">第 ${rank} 名</div><div style="flex: 1; text-align: center; color: ${isFirst ? 'var(--accent-gold)' : 'var(--accent-blue)'};">${rankName}</div><div style="width: 250px; text-align: right; font-family: monospace;">${rankTotal}</div></div>`; 
    }); 
    const btn = document.getElementById('btnRevealNext'); 
    if (currentRevealRank > 0) { 
        btn.innerText = `🥁 揭曉第 ${currentRevealRank} 名`; btn.onclick = revealNext; btn.className = 'btn-reveal-next'; 
    } else { 
        btn.innerText = `🔍 解謎：開啟時空檔案庫`; btn.onclick = goToArchive; btn.className = 'btn-reveal-next done'; 
    } 
}
function revealNext() { if (currentRevealRank > 0) { currentRevealRank--; if(currentRevealRank === 0) SoundFX.champion(); else SoundFX.reveal(); renderRevealList(); } }

function closeFinalReveal() {
    document.getElementById('finalRankModal').style.display = 'none';
    // 關閉頒獎台時，解除蓋牌鎖定，讓老師與各組可以回去看明細
    maskRankings = false; 
    updateRank(); 
    document.getElementById('yearLabel').innerHTML = "最終結算 (揭曉完畢)";
    MusicSystem.start('idle'); // 恢復平靜背景音樂
}

// ==========================================
// 5. 時空股市檔案庫 (Archive View Logic)
// ==========================================
function goToArchive() {
    document.getElementById('finalRankModal').style.display = 'none';
    switchView('view-archive');
    MusicSystem.start('idle'); // 恢復平靜音樂
    initArchive();
}

function goToExchangeFromArchive() {
    switchView('view-exchange');
    MusicSystem.start('idle');
}

let archiveInit = false;
function initArchive() {
    if (archiveInit) return; archiveInit = true;
    const grid = document.getElementById('archiveGrid');
    stockData.forEach(s => {
        grid.innerHTML += `
            <div class="card-container" onclick="flipCard(this)">
                <div class="card">
                    <div class="card-face card-front">
                        <div class="c-id">代號：${s.id}</div>
                        <div class="c-hint">${s.hint}</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="c-real-name">${s.realName}</div>
                        <button class="btn-chart" onclick="openArchiveChart(event, '${s.id}')">📊 查看走勢覆盤</button>
                    </div>
                </div>
            </div>
        `;
    });
}

function flipCard(el) { el.querySelector('.card').classList.add('flipped'); }

const arcCanvas = document.getElementById('archiveChartCanvas');
const arcCtx = arcCanvas.getContext('2d');
let currentChartStock = null;
let arcPoints = []; 
let arcProgress = 0; 
let arcAnimReq = null;

function openArchiveChart(e, id) {
    e.stopPropagation(); 
    currentChartStock = stockData.find(x => x.id === id);
    arcProgress = 0; 
    document.getElementById('arcMTitle').innerText = currentChartStock.realName;
    document.getElementById('arcMStats').style.display = 'none';
    document.getElementById('arcBtnPlay').style.display = 'block';
    document.getElementById('eventBox').innerHTML = '圖表準備就緒，請點擊「開始十年覆盤」。';
    
    const infoBox = document.getElementById('infoBox');
    const infoBtn = document.getElementById('arcBtnInfoToggle');
    infoBox.style.display = 'none';
    infoBox.innerHTML = `<div class="info-content">${currentChartStock.background}</div>`;
    infoBtn.innerHTML = 'ℹ️ 公司背景與主要商品'; infoBtn.style.background = '#222'; infoBtn.style.color = '#ccc';
    
    document.getElementById('archiveChartModal').style.display = 'flex';
    resizeArcCanvas(); 
}

function toggleArchiveInfo() {
    const box = document.getElementById('infoBox'); const btn = document.getElementById('arcBtnInfoToggle');
    if (box.style.display === 'none' || box.style.display === '') { box.style.display = 'flex'; btn.innerHTML = '🔙 返回覆盤圖表'; btn.style.background = 'var(--accent-gold)'; btn.style.color = '#000'; } 
    else { box.style.display = 'none'; btn.innerHTML = 'ℹ️ 公司背景與主要商品'; btn.style.background = '#222'; btn.style.color = '#ccc'; }
}
function closeArchiveChart() { if(arcAnimReq) cancelAnimationFrame(arcAnimReq); document.getElementById('archiveChartModal').style.display = 'none'; }
function resizeArcCanvas() { const rect = arcCanvas.parentElement.getBoundingClientRect(); arcCanvas.width = rect.width - 60; arcCanvas.height = 450; if(currentChartStock) drawArcChart(); }
window.addEventListener('resize', () => { if(document.getElementById('archiveChartModal').style.display === 'flex') resizeArcCanvas(); });

function startArchiveAnimation() {
    document.getElementById('arcBtnPlay').style.display = 'none';
    document.getElementById('eventBox').innerHTML = '<span style="color:var(--accent-blue);">市場走勢重現中...</span>';
    MusicSystem.switchMode('running');
    
    function animate() {
        arcProgress += 0.08; 
        if (arcProgress >= 10) { 
            arcProgress = 10; drawArcChart(); showArcFinalStats(); 
            MusicSystem.switchMode('idle'); return; 
        }
        drawArcChart(); arcAnimReq = requestAnimationFrame(animate);
    }
    animate();
}

function showArcFinalStats() {
    const startP = currentChartStock.yearlyPrices[0];
    const endP = currentChartStock.yearlyPrices[10];
    const totalReturn = ((endP / startP) - 1) * 100;
    const colorClass = totalReturn >= 0 ? 'stat-up' : 'stat-down';
    const sign = totalReturn >= 0 ? '+' : '';
    const statsEl = document.getElementById('arcMStats');
    statsEl.innerHTML = `2016 起始價: $${startP.toLocaleString()} &nbsp;|&nbsp; 2025 最終價: $${endP.toLocaleString()} (<span class="${colorClass}">${sign}${totalReturn.toFixed(1)}%</span>)`;
    statsEl.style.display = 'block';
    document.getElementById('eventBox').innerHTML = '覆盤結束。<b>請點選圖表上的圓點</b>，查看各年度詳細股價與大事件。';
}

function drawArcChart() {
    if (!currentChartStock) return;
    const W = arcCanvas.width, H = arcCanvas.height, padX = 60, padY = 40;
    const innerW = W - padX * 2, innerH = H - padY * 2;
    arcCtx.clearRect(0, 0, W, H); arcPoints = []; 
    
    const prices = currentChartStock.yearlyPrices; // length: 11
    const maxP = Math.max(...prices), minP = Math.min(...prices);
    const range = (maxP - minP) || 1; 
    const scaleY = innerH / (range * 1.2), offsetY = innerH * 0.1; 
    
    arcCtx.strokeStyle = '#333'; arcCtx.lineWidth = 1; arcCtx.fillStyle = '#666'; arcCtx.font = '12px sans-serif'; arcCtx.textAlign = 'right'; arcCtx.textBaseline = 'middle';
    for(let i=0; i<=4; i++) { let yPos = padY + (innerH / 4) * i; let pVal = Math.round(maxP + (range*0.1) - (range * 1.2 / 4) * i); arcCtx.beginPath(); arcCtx.moveTo(padX, yPos); arcCtx.lineTo(W - padX, yPos); arcCtx.stroke(); arcCtx.fillText("$" + pVal.toLocaleString(), padX - 10, yPos); }
    
    arcCtx.textAlign = 'center'; arcCtx.textBaseline = 'top';
    const years = ["'16初", "'16末", "'17", "'18", "'19", "'20", "'21", "'22", "'23", "'24", "'25"];
    for (let i = 0; i < 11; i++) {
        let x = padX + (innerW / 10) * i, y = padY + offsetY + (maxP - prices[i]) * scaleY;
        arcPoints.push({ x: x, y: y, price: prices[i], yearIdx: i, label: years[i], yearVal: 2015 + i });
        arcCtx.fillStyle = (i >= playStartOffset && i <= playStartOffset + globalRoundCount) ? '#fff' : '#666'; // Highlight played years
        arcCtx.fillText(years[i], x, H - padY + 10);
    }
    
    let lastCompleteIdx = Math.floor(arcProgress);
    arcCtx.beginPath(); arcCtx.moveTo(arcPoints[0].x, arcPoints[0].y);
    for (let i = 1; i <= lastCompleteIdx; i++) arcCtx.lineTo(arcPoints[i].x, arcPoints[i].y);
    if (lastCompleteIdx < 10) { let nextIdx = lastCompleteIdx + 1; let ratio = arcProgress - lastCompleteIdx; let cX = arcPoints[lastCompleteIdx].x + (arcPoints[nextIdx].x - arcPoints[lastCompleteIdx].x) * ratio; let cY = arcPoints[lastCompleteIdx].y + (arcPoints[nextIdx].y - arcPoints[lastCompleteIdx].y) * ratio; arcCtx.lineTo(cX, cY); }
    
    const lineColor = prices[10] >= prices[0] ? '#ff3b30' : '#4cd964'; 
    arcCtx.strokeStyle = lineColor; arcCtx.lineWidth = 4; arcCtx.shadowColor = lineColor; arcCtx.shadowBlur = 15; arcCtx.stroke(); arcCtx.shadowBlur = 0; 
    
    const evts = keyEvents[currentChartStock.id] || {};
    for (let i = 0; i <= lastCompleteIdx; i++) {
        let pt = arcPoints[i]; let hasEvent = evts[pt.yearVal] !== undefined;
        arcCtx.beginPath(); arcCtx.arc(pt.x, pt.y, hasEvent ? 8 : 4, 0, Math.PI * 2);
        arcCtx.fillStyle = hasEvent ? '#ffcc00' : '#111'; arcCtx.fill(); arcCtx.lineWidth = 2; arcCtx.strokeStyle = hasEvent ? '#fff' : lineColor; arcCtx.stroke();
    }
    
    // Highlight start/end of gameplay
    if (arcProgress >= playStartOffset) {
        let st = arcPoints[playStartOffset];
        arcCtx.fillStyle = 'rgba(0, 242, 254, 0.3)'; arcCtx.beginPath(); arcCtx.arc(st.x, st.y, 15, 0, Math.PI*2); arcCtx.fill();
    }
}

arcCanvas.addEventListener('click', function(e) {
    if (!currentChartStock || arcPoints.length === 0) return;
    const rect = arcCanvas.getBoundingClientRect(); const scaleX = arcCanvas.width / rect.width; const scaleY = arcCanvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX, my = (e.clientY - rect.top) * scaleY;
    let closestPt = null; let minDist = 40; let lastIdx = Math.floor(arcProgress);
    for (let i = 0; i <= lastIdx; i++) { let dist = Math.hypot(arcPoints[i].x - mx, arcPoints[i].y - my); if (dist < minDist) { minDist = dist; closestPt = arcPoints[i]; } }
    
    if (closestPt) {
        SoundFX.tick();
        const evts = keyEvents[currentChartStock.id] || {}; const eventText = evts[closestPt.yearVal];
        const titleText = closestPt.yearVal === 2015 ? "2016 年初 (走勢起點)" : `${closestPt.yearVal} 年底結算`;
        let htmlContent = `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:10px;"><span style="color:var(--accent-blue); font-weight:bold; font-size:1.2em;">${titleText}</span><span>股價: <span style="font-family:monospace; color:var(--accent-gold); font-size:1.4em;">$${closestPt.price.toLocaleString()}</span></span></div>`;
        if (eventText) htmlContent += `<div style="color:#fff;">🔔 <b>當年大事件：</b><br>${eventText}</div>`;
        else htmlContent += `<div style="color:#888; font-style:italic;">該年度無特殊重大事件，股價受大盤與產業趨勢影響。</div>`;
        if (closestPt.yearIdx === playStartOffset) htmlContent += `<div style="margin-top:10px; color:#00f2fe; font-size:0.9em;">📍 此為本次模擬器之「開局起始點」。</div>`;
        document.getElementById('eventBox').innerHTML = htmlContent;
    }
});
arcCanvas.addEventListener('mousemove', function(e) {
    if (!currentChartStock || arcPoints.length === 0) return;
    const rect = arcCanvas.getBoundingClientRect(); const mx = (e.clientX - rect.left) * (arcCanvas.width / rect.width), my = (e.clientY - rect.top) * (arcCanvas.height / rect.height);
    let isHovering = false; let lastIdx = Math.floor(arcProgress);
    for (let i = 0; i <= lastIdx; i++) { if (Math.hypot(arcPoints[i].x - mx, arcPoints[i].y - my) < 25) { isHovering = true; break; } }
    arcCanvas.style.cursor = isHovering ? 'pointer' : 'crosshair';
});
</script>
